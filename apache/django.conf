<VirtualHost *:80>
    ServerAdmin webmaster@localhost

    SetEnv DJANGO_SETTINGS_MODULE config.settings.production

    Alias /static/ /app/staticfiles/
    <Directory /app/staticfiles>
        Options -Indexes
        Require all granted
    </Directory>

    Alias /media/ /app/media/
    <Directory /app/media>
        Options -Indexes
        Require all granted
    </Directory>

    WSGIDaemonProcess blog_papa \
        python-path=/app \
        processes=2 \
        threads=5
    WSGIProcessGroup blog_papa
    WSGIScriptAlias / /app/config/wsgi.py
    WSGIPassAuthorization On

    <Directory /app/config>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
