<VirtualHost *:80>
    ServerAdmin webmaster@localhost

    SetEnv DJANGO_SETTINGS_MODULE config.settings.production

    Alias /static/ /var/www/blog_papa/staticfiles/
    <Directory /var/www/blog_papa/staticfiles>
        Options -Indexes
        Require all granted
    </Directory>

    Alias /media/ /var/www/blog_papa/media/
    <Directory /var/www/blog_papa/media>
        Options -Indexes
        Require all granted
    </Directory>

    <Directory /var/www/blog_papa>
        Options -Indexes
        Require all granted
    </Directory>

    WSGIDaemonProcess blog_papa \
        python-path=/var/www/blog_papa \
        processes=2 \
        threads=5
    WSGIProcessGroup blog_papa
    WSGIScriptAlias / /var/www/blog_papa/config/wsgi.py
    WSGIPassAuthorization On

    <Directory /var/www/blog_papa/config>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
